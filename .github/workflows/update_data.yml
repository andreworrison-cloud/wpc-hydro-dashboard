name: Update WPC Data

on:
  # This allows the workflow to be triggered remotely by cron-job.org every 5 mins
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-data:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install geopandas pandas requests

      - name: Run WPC Fetch Script
        run: python fetch_wpc.py

      - name: Run FFD Contour Fetch Script
        run: python fetch_ffd.py

      - name: Commit and Push Changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          
          git add wpc_data.geojson static/ffd_contours.txt
          
          git diff --quiet && git diff --staged --quiet || (git commit -m "Auto-update WPC and FFD real-time data" && git push)
