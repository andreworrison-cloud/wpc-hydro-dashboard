name: Update WPC Data

on:
  # This allows the workflow to be triggered remotely by cron-job.org
  workflow_dispatch:

# THIS IS THE NEW MAGIC KEY
permissions:
  contents: write

jobs:
  update-data:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install geopandas pandas requests

      - name: Run WPC Fetch Script
        run: python fetch_wpc.py

      - name: Commit and Push Changes
        run: |
          # Configure the Git bot identity
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          
          # Stage the GeoJSON file
          git add wpc_data.geojson
          
          # Check if there are actual changes to commit. If there are, commit and push them.
          git diff --quiet && git diff --staged --quiet || (git commit -m "Auto-update WPC real-time data" && git push)
